<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" role="img" aria-label="Newton">
  <title>Newton</title>
  <!-- Prism mark + rays, local group anchored at (20, 12) -->
  <g transform="translate(20, 12)">
    <!-- incoming ray -->
    <line x1="0" y1="80" x2="42" y2="80" stroke="#7A9E7E" stroke-width="2.5" stroke-linecap="round"/>
    <!-- equilateral prism: side=120, height=103.92 -->
    <polygon points="80,32 140,136 20,136" fill="#7A9E7E"/>
    <!-- outgoing rays, graduated opacity for dispersion effect -->
    <line x1="118" y1="80" x2="200" y2="49"  stroke="#7A9E7E" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>
    <line x1="118" y1="80" x2="204" y2="65"  stroke="#7A9E7E" stroke-width="2.5" stroke-linecap="round" opacity="0.80"/>
    <line x1="118" y1="80" x2="206" y2="80"  stroke="#7A9E7E" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
    <line x1="118" y1="80" x2="204" y2="95"  stroke="#7A9E7E" stroke-width="2.5" stroke-linecap="round" opacity="0.50"/>
    <line x1="118" y1="80" x2="200" y2="111" stroke="#7A9E7E" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
  </g>
  <!-- wordmark -->
  <text x="270" y="108" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="400" fill="#2C3E35" letter-spacing="-1.5">Newton</text>
</svg>
